payment.gateway.url=http://localhost:9090
macstab.chaos.enabled=true
macstab.chaos.actuator.enabled=true
management.endpoints.web.exposure.include=chaos,health
spring.application.name=sb3-actuator-live-chaos
resilience4j.circuitbreaker.instances.payment-gateway.slidingWindowSize=5
resilience4j.circuitbreaker.instances.payment-gateway.failureRateThreshold=60
resilience4j.circuitbreaker.instances.payment-gateway.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.payment-gateway.permittedNumberOfCallsInHalfOpenState=2

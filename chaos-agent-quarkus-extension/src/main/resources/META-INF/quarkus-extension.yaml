artifact: com.macstab.chaos.jvm:chaos-agent-quarkus-extension
name: Macstab Chaos JVM Agent
description: Chaos engineering extension for Quarkus applications
# The deployment-artifact pointer is mandatory for Quarkus extensions: the
# deployment loader discovers @BuildStep classes only from the declared
# deployment jar. Without this line Quarkus silently ignores the extension's
# build steps, so the feature never registers and the runtime-init recorder
# bytecode is never emitted.
deployment-artifact: com.macstab.chaos.jvm:chaos-agent-quarkus-extension-deployment
metadata:
  keywords:
    - chaos
    - testing
    - resilience

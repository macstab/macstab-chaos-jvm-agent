name: Build & Test

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, feat/**]

# Deduplication by commit SHA: same commit runs once, duplicates are skipped.
concurrency:
  group: build-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request' && github.event.pull_request == null

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check code formatting
        run: ./gradlew spotlessCheck --no-daemon --stacktrace

      - name: Build with Gradle (includes tests)
        run: ./gradlew build jacocoAggregatedReport --no-daemon --stacktrace

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'

      - name: Upload jacoco coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: |
            build/reports/jacoco/aggregated/**
            **/build/reports/jacoco/test/html/**
            **/build/reports/jacoco/test/jacocoTestReport.xml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: '**/build/libs/*.jar'
